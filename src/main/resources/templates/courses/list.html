<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Courses</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main>
    <h1>Courses</h1>

    <form th:action="@{/courses/search-redirect}" method="get" style="display:inline;">
        <label for="search">Search</label>
        <input id="search" name="data" type="text" required >
        <button type="submit" style="display:none;">Search</button> </form>

    <p>
        <button><a th:href="@{/courses/new}">Create new course</a></button>
        <button style="margin-left: 10px;"><a th:href="@{/courses}">View All</a></button>
    </p>

    <table>
        <thead>
        <tr>
            <th>Title</th>
            <th>Instructor</th>
            <th>Course Code</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${courses}">
            <td th:text="${c.title}"></td>
            <td th:text="${c.instructor}"></td>
            <td th:text="${c.courseCode}"></td>
            <td>

                <button><a th:href="@{/courses/{id}/edit(id=${c.id})}">Edit</a></button>

                <form th:action="@{/courses/{id}/delete(id=${c.id})}" method="post" style="display:inline;">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>
